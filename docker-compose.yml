services:
  postgres:
    image: postgres:16-alpine
    container_name: medflow-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medflow
    volumes:
      - medflow_pgdata:/var/lib/postgresql/data

volumes:
  medflow_pgdata:
